<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>December Trip Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero">
    <p class="eyebrow">Trip board · updated by everyone</p>
    <h1>Where are we going<br>this December?</h1>
    <div id="countdown" class="countdown">--</div>
    <a id="add-trip" class="add-trip" href="#" target="_blank" rel="noopener">+ Add a trip</a>
  </header>

  <main>
    <section id="board" class="board" aria-live="polite">
      <!-- trip tags render here -->
    </section>

    <section id="empty" class="empty" hidden>
      <p>No trips on the board yet.</p>
      <p class="empty-sub">Add one by editing <code>trips.json</code> — see the README.</p>
    </section>
  </main>

  <footer class="footer">
    <p>Data lives in <code>trips.json</code>. Edit it on GitHub, commit, and this board updates automatically.</p>
  </footer>

<script src="script.js"></script>
</body>
</html>
